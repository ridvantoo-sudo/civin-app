# Fly app names are globally unique. Change this before the first deployment.
app = "civin-backend"
primary_region = "fra"
kill_signal = "SIGTERM"
kill_timeout = "120s"

[build]
  dockerfile = "Dockerfile"

[deploy]
  release_command = "php artisan migrate --force"
  strategy = "rolling"

[env]
  APP_ENV = "production"
  APP_DEBUG = "false"
  APP_URL = "https://civin-backend.fly.dev"
  LOG_CHANNEL = "stderr"
  LOG_LEVEL = "warning"
  BROADCAST_CONNECTION = "log"
  CACHE_STORE = "redis"
  DB_CONNECTION = "mysql"
  FILESYSTEM_DISK = "local"
  FIREBASE_CREDENTIALS = "/var/www/html/storage/app/firebase-service-account.json"
  QUEUE_CONNECTION = "redis"
  REDIS_CLIENT = "predis"
  SESSION_DRIVER = "database"
  SESSION_SECURE_COOKIE = "true"

[[files]]
  guest_path = "/var/www/html/storage/app/firebase-service-account.json"
  secret_name = "FIREBASE_SERVICE_ACCOUNT"

[processes]
  web = "apache2-foreground"
  worker = "php artisan queue:work redis --queue=default --sleep=3 --tries=3 --backoff=5 --timeout=90 --max-time=3600"
  scheduler = "php artisan schedule:work"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["web"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 50
    hard_limit = 75

  [[http_service.checks]]
    grace_period = "30s"
    interval = "30s"
    method = "GET"
    path = "/up"
    timeout = "5s"

    [http_service.checks.headers]
      X-Forwarded-Proto = "https"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "1gb"
